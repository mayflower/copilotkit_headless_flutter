name: Bug report
description: Report a reproducible defect.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide a minimal code sample, failing test, or example change.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Package, Flutter, Dart, platform, and agent backend versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or AG-UI events
      render: text
