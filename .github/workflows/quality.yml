name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  package-quality:
    name: Package Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check dependency freshness
        continue-on-error: true
        run: flutter pub outdated

      - name: Install pana
        run: dart pub global activate pana

      - name: Run pub.dev package analysis
        run: |
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          mkdir -p "$tmp_dir/package"
          tar \
            --exclude='./.git' \
            --exclude='./.dart_tool' \
            --exclude='./build' \
            --exclude='./coverage' \
            --exclude='./example/.dart_tool' \
            --exclude='./example/build' \
            -cf - . | tar -xf - -C "$tmp_dir/package"
          dart pub global run pana --exit-code-threshold 20 "$tmp_dir/package"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23

  workflow-quality:
    name: Workflow Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-check
          fail_level: error

      - name: Audit GitHub Actions workflows
        uses: zizmorcore/zizmor-action@e639db99335bc9038abc0e066dfcd72e23d26fb4 # v0.3.0
        with:
          inputs: .github/workflows
          advanced-security: false
          annotations: true
          version: v1.24.1

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

      - name: Install Gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.28.0

      - name: Scan for secrets
        run: |
          "$HOME/go/bin/gitleaks" detect --source . --redact --no-git --verbose
